<style>
:root {
  --bg: #F7F5F2;
  --surface: #FFFFFF;
  --surface2: #F0EDE8;
  --border: #E2DDD6;
  --text: #1C1A17;
  --text2: #6B6560;
  --text3: #9C978F;
  --gold: #C9A84C;
  --gold-light: #F0E4C0;
  --gold-dark: #A8893A;
  --dark: #2D2B27;
  --danger: #C0392B;
  --success: #27AE60;
  --info: #2980B9;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --sidebar-w: 240px;
  --transition: all 0.2s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
h1,h2,h3 { font-family: 'Playfair Display', serif; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── AUTH SCREEN ── */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1C1A17 0%, #2D2B27 50%, #3D3830 100%);
  position: relative;
  overflow: hidden;
}
#auth-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
  top: -100px; right: -100px;
}
#auth-screen::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
  bottom: -50px; left: -50px;
}
.auth-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px;
  padding: 48px 40px;
  width: 380px;
  max-width: 90vw;
  text-align: center;
  backdrop-filter: blur(20px);
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.auth-logo { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); letter-spacing: -0.5px; margin-bottom: 4px; }
.auth-sub { color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-bottom: 36px; letter-spacing: 2px; text-transform: uppercase; }
.auth-tagline { color: rgba(255,255,255,0.7); font-size: 0.95rem; margin-bottom: 32px; line-height: 1.6; }
.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  background: var(--gold);
  color: var(--dark);
  border: none; border-radius: 10px;
  padding: 14px 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem; font-weight: 600;
  cursor: pointer; width: 100%;
  transition: var(--transition);
}
.btn-google:hover { background: var(--gold-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,76,0.4); }
.btn-google svg { flex-shrink: 0; }
.auth-note { color: rgba(255,255,255,0.3); font-size: 0.75rem; margin-top: 20px; }

/* ── APP LAYOUT ── */
#app { display: none; min-height: 100vh; }
.layout { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--dark);
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s ease;
}
.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-logo-name { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.3rem; }
.sidebar-logo-sub { color: rgba(255,255,255,0.3); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
.nav-section { margin-bottom: 24px; }
.nav-label { color: rgba(255,255,255,0.25); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; padding: 0 8px; margin-bottom: 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  color: rgba(255,255,255,0.55); font-size: 0.9rem; font-weight: 500;
  cursor: pointer; transition: var(--transition); margin-bottom: 2px;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
.nav-item.active { background: rgba(201,168,76,0.15); color: var(--gold); }
.nav-item .icon { width: 18px; text-align: center; flex-shrink: 0; }
.sidebar-user {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--gold); display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 700; color: var(--dark); flex-shrink: 0;
  overflow: hidden;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { color: rgba(255,255,255,0.7); font-size: 0.82rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-logout { background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; padding: 4px; transition: var(--transition); }
.btn-logout:hover { color: var(--danger); }

/* ── MAIN ── */
.main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.menu-toggle { display: none; background: none; border: none; cursor: pointer; color: var(--text); padding: 4px; }
.topbar-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.content { flex: 1; padding: 28px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
  cursor: pointer; border: none; transition: var(--transition);
}
.btn-primary { background: var(--gold); color: var(--dark); }
.btn-primary:hover { background: var(--gold-dark); transform: translateY(-1px); }
.btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--surface2); }
.btn-danger { background: #FDEDED; color: var(--danger); border: 1px solid #F5C6C6; }
.btn-danger:hover { background: #FAD5D5; }
.btn-success { background: #EBF8F1; color: var(--success); border: 1px solid #A8DFBE; }
.btn-ghost { background: none; border: none; color: var(--text2); padding: 6px 10px; }
.btn-ghost:hover { color: var(--text); background: var(--surface2); border-radius: var(--radius-sm); }
.btn-sm { padding: 7px 12px; font-size: 0.8rem; }
.btn-icon { padding: 8px; border-radius: 8px; }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
.card-sm { padding: 16px; }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 24px; position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute;
  width: 80px; height: 80px; border-radius: 50%;
  top: -20px; right: -20px;
  background: var(--gold-light); opacity: 0.4;
}
.stat-label { color: var(--text2); font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--text); margin: 6px 0 4px; }
.stat-sub { color: var(--text3); font-size: 0.78rem; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; padding: 10px 16px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-weight: 600; border-bottom: 1px solid var(--border); }
tbody td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--bg); }

/* ── BADGE ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
.badge-draft { background: #F0EDE8; color: var(--text2); }
.badge-sent { background: #EBF5FB; color: var(--info); }
.badge-accepted { background: #EBF8F1; color: var(--success); }
.badge-rejected { background: #FDEDED; color: var(--danger); }

/* ── FORM ── */
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
  background: var(--surface); transition: var(--transition); outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
/* ogni modal successiva sale di z-index */
.modal-overlay:nth-child(2) { z-index: 210; background: rgba(0,0,0,0.35); }
.modal-overlay:nth-child(3) { z-index: 220; background: rgba(0,0,0,0.25); }
.modal {
  background: var(--surface); border-radius: 16px; box-shadow: var(--shadow-lg);
  width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto;
  transform: scale(0.95); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: scale(1); }
.modal-lg { max-width: 860px; }
.modal-header { padding: 24px 28px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
.modal-body { padding: 24px 28px; }
.modal-footer { padding: 0 28px 24px; display: flex; gap: 10px; justify-content: flex-end; }
.btn-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1.2rem; padding: 4px; line-height: 1; }
.btn-close:hover { color: var(--text); }

/* ── PRODUCT PICKER ── */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; max-height: 400px; overflow-y: auto; }
.product-pick-card {
  border: 2px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px; cursor: pointer; transition: var(--transition);
}
.product-pick-card:hover { border-color: var(--gold); background: var(--gold-light); }
.product-pick-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); }
.product-pick-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
.product-pick-cat { color: var(--text3); font-size: 0.75rem; margin-bottom: 6px; }
.product-pick-price { color: var(--gold-dark); font-weight: 700; font-size: 1rem; }

/* ── QUOTE ITEMS ── */
.quote-item {
  display: grid; align-items: center;
  grid-template-columns: 1fr auto auto auto;
  gap: 12px; padding: 12px 16px;
  background: var(--bg); border-radius: var(--radius-sm);
  margin-bottom: 8px; border: 1px solid var(--border);
}
.quote-item-name { font-weight: 600; font-size: 0.9rem; }
.quote-item-cat { color: var(--text3); font-size: 0.75rem; }
.qty-input { width: 60px; text-align: center; padding: 6px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; }
.item-total { font-weight: 700; color: var(--gold-dark); min-width: 80px; text-align: right; }

/* ── SEARCH ── */
.search-box { position: relative; }
.search-box input { padding-left: 36px; }
.search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

/* ── LOGO UPLOAD ── */
.logo-upload-area {
  border: 2px dashed var(--border); border-radius: var(--radius-sm);
  padding: 20px; text-align: center; cursor: pointer; transition: var(--transition);
}
.logo-upload-area:hover { border-color: var(--gold); background: var(--gold-light); }
.logo-preview { max-height: 80px; margin: 0 auto 8px; display: block; }

/* ── MOBILE ── */
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--dark); border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 100; padding: 8px 0 env(safe-area-inset-bottom);
}
.bottom-nav-items { display: flex; justify-content: space-around; }
.bottom-nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 12px; background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.4); font-size: 0.68rem; font-family: 'DM Sans', sans-serif;
  transition: var(--transition);
}
.bottom-nav-item.active { color: var(--gold); }
.bottom-nav-item svg { width: 20px; height: 20px; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-state svg { margin: 0 auto 16px; display: block; opacity: 0.4; }
.empty-state h3 { font-family: 'Playfair Display', serif; color: var(--text2); margin-bottom: 8px; }

/* ── TOAST ── */
#toast-container { position: fixed; bottom: 80px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--dark); color: white; padding: 12px 18px; border-radius: 10px;
  font-size: 0.85rem; box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 10px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.info { border-left: 3px solid var(--gold); }
@keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

/* ── DASHBOARD ── */
.recent-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

/* ── SETTINGS ── */
.settings-section { margin-bottom: 28px; }
.settings-section h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .main { margin-left: 0; padding-bottom: 80px; }
  .topbar { padding: 14px 16px; }
  .content { padding: 16px; }
  .menu-toggle { display: block; }
  .bottom-nav { display: block; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .recent-grid { grid-template-columns: 1fr; }
  .topbar-actions .btn-text { display: none; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .modal { border-radius: 16px 16px 0 0; }
  .modal-overlay { align-items: flex-end; padding: 0; }
}

/* ── PRINT ── */
@media print { body * { display: none; } #print-area { display: block !important; } }
#print-area { display: none; }

/* ── SIDEBAR OVERLAY (mobile) ── */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
.sidebar-overlay.open { display: block; }

.chip { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; background: var(--gold-light); color: var(--gold-dark); font-weight: 600; }
.global-search-results {
  position: absolute; top: 100%; right: 0; width: 360px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-lg);
  z-index: 500; max-height: 400px; overflow-y: auto;
  margin-top: 4px;
}
.gsr-section { padding: 8px 14px 4px; font-size: 0.7rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
.gsr-item { padding: 10px 14px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }

    el.classList.toggle('active', el.dataset.page === page);
  });
  document.querySelectorAll('.bottom-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.bnav === page);

  document.getElementById('page-title').textContent = titles[page] || page;

  const renderers = { dashboard: renderDashboard, preventivi: renderPreventivi, prodotti: renderProdotti, clienti: renderClienti, impostazioni: renderImpostazioni, categorie: renderCategoriePage };
  if (renderers[page]) renderers[page]();

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  t.innerHTML = `<span>${icons[type]||'ℹ'}</span> ${msg}`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ════════════════════════════════════════════
//  MODAL — stack system (modal sopra modal)
// ════════════════════════════════════════════
let _modalStack = [];

function openModal(html, large = false) {
  const id = 'modal-' + Date.now();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = id;
  overlay.innerHTML = `<div class="modal ${large?'modal-lg':''}">${html}</div>`;
  document.getElementById('modal-container').appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('open'));
  _modalStack.push(id);
}

function closeModal() {
  if (!_modalStack.length) return;
  const id = _modalStack.pop();
  const m = document.getElementById(id);
  if (m) { m.classList.remove('open'); setTimeout(() => m.remove(), 200); }
}

function closeAllModals() {
  [..._modalStack].forEach(() => closeModal());
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);

}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6).toUpperCase(); }

function statusBadge(s) {

  return `<span class="badge ${map[s]||'badge-draft'}">${label[s]||s}</span>`;
}

function renderToggle(key, label, desc) {
  const on = features[key];

        width:46px;height:26px;border-radius:13px;border:none;cursor:pointer;
        background:${on ? 'var(--gold)' : 'var(--border)'};
        position:relative;transition:background 0.2s;flex-shrink:0" id="toggle-${key}">
        <span style="
          position:absolute;top:3px;left:${on?'23':'3'}px;
          width:20px;height:20px;border-radius:50%;
          background:white;transition:left 0.2s;
          box-shadow:0 1px 4px rgba(0,0,0,0.2)"></span>
      </button>
    </div>`;
}

function toggleFeature(key) {
  features[key] = !features[key];
  // aggiorna visivamente il toggle senza ricaricare tutto
  const btn = document.getElementById('toggle-' + key);
  if (btn) {
    btn.style.background = features[key] ? 'var(--gold)' : 'var(--border)';
    const dot = btn.querySelector('span');
    if (dot) dot.style.left = features[key] ? '23px' : '3px';
  }
}

function handleLogoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2*1024*1024) { toast('File troppo grande (max 2MB)', 'error'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    companyData.logoBase64 = ev.target.result;
    renderImpostazioni();
    toast('Logo caricato — salva per confermare', 'info');
  };
  reader.readAsDataURL(file);
}

// ── Aggiungi categoria/materiale al volo dal modal prodotto ──
function addCatAlVolo() {
  const box = document.getElementById('nuova-cat-inline');
  if (box) { box.style.display = box.style.display === 'none' ? 'block' : 'none'; }
  setTimeout(() => document.getElementById('nuova-cat-val')?.focus(), 50);
}
async function confermaCatAlVolo() {
  const inp = document.getElementById('nuova-cat-val');
  const v = inp?.value.trim();
  if (!v) { toast('Inserisci il nome della categoria', 'error'); return; }
  if (categorieList.includes(v)) { toast('Categoria già presente', 'info'); return; }
  categorieList.push(v);
  await saveCatMat();
  // aggiorna il select
  const sel = document.getElementById('p-cat');
  if (sel) {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v; opt.selected = true;
    sel.appendChild(opt);
  }
  if (inp) inp.value = '';
  const box = document.getElementById('nuova-cat-inline');
  if (box) box.style.display = 'none';
  toast(`Categoria "${v}" aggiunta!`, 'success');
}

function addMatAlVolo() {
  const box = document.getElementById('nuova-mat-inline');
  if (box) { box.style.display = box.style.display === 'none' ? 'block' : 'none'; }
  setTimeout(() => document.getElementById('nuova-mat-val')?.focus(), 50);
}
async function confermaMatAlVolo() {
  const inp = document.getElementById('nuova-mat-val');
  const v = inp?.value.trim();
  if (!v) { toast('Inserisci il nome del materiale', 'error'); return; }
  if (materialiList.includes(v)) { toast('Materiale già presente', 'info'); return; }
  materialiList.push(v);
  await saveCatMat();
  const sel = document.getElementById('p-mat');
  if (sel) {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v; opt.selected = true;
    sel.appendChild(opt);
  }
  if (inp) inp.value = '';
  const box = document.getElementById('nuova-mat-inline');
  if (box) box.style.display = 'none';
  toast(`Materiale "${v}" aggiunto!`, 'success');
}

function handleProdFoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2*1024*1024) { toast('Foto troppo grande (max 2MB)', 'error'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    window._prodFotoBase64 = ev.target.result;
    const prev = document.getElementById('p-foto-preview');
    if (prev) prev.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">`;
    toast('Foto caricata — salva per confermare', 'info');
  };
  reader.readAsDataURL(file);
}
function removeProdFoto() {
  window._prodFotoBase64 = null;
  const prev = document.getElementById('p-foto-preview');
  if (prev) prev.innerHTML = `<span style="font-size:1.5rem;color:var(--text3)">📷</span>`;
}

async function saveProdotto(id, fromPicker = false) {
  const nome = document.getElementById('p-nome').value.trim();
  const prezzo = parseFloat(document.getElementById('p-prezzo').value);
  if (!nome || isNaN(prezzo)) { toast('Compila nome e prezzo', 'error'); return; }
  const data = {
    nome, prezzo,
    sistema: document.getElementById('p-sistema').value,
    categoria: document.getElementById('p-cat').value,
    materiale: document.getElementById('p-mat').value,
    coloreProfili: document.getElementById('p-coloreprofili').value,
    coloreAccessori: document.getElementById('p-coloreaccess').value,
    altezzaManiglia: parseInt(document.getElementById('p-maniglia').value)||null,
    tamponamento: document.getElementById('p-tamponamento').value,
    um: document.getElementById('p-um').value,
    descrizione: document.getElementById('p-desc').value,
    foto: window._prodFotoBase64 || null,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  let newDocId = id;
  if (id) {
    await db.collection('prodotti').doc(id).update(data);
    toast('Prodotto aggiornato!', 'success');
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    const ref = await db.collection('prodotti').add(data);
    newDocId = ref.id;
    toast('Prodotto aggiunto!', 'success');
  }
  // reload prodotti list
  await loadProdotti();
  closeModal();
  if (fromPicker) {
    // auto-select the new product and re-open picker
    const newProd = prodotti.find(p => p.id === newDocId);
    if (newProd) {
      preventivoItems.push({ prodottoId: newProd.id, nome: newProd.nome, categoria: newProd.categoria, materiale: newProd.materiale, prezzo: newProd.prezzo, um: newProd.um || 'pz', foto: newProd.foto || null, descrizione: newProd.descrizione || '', qty: 1, larghezza: null, altezza: null, mqManuale: null, descrizioneRiga: '' });

      toast('Prodotto creato e aggiunto al preventivo!', 'success');

  } else {
    renderProdotti();
  }
}

async function cambiaStato(prevId, nuovoStato) {
  await db.collection('preventivi').doc(prevId).update({
    stato: nuovoStato,

  });
  // aggiorna localmente senza ricaricare tutto
  const p = preventivi.find(x => x.id === prevId);
  if (p) p.stato = nuovoStato;
  const sel = document.querySelector(`select[onchange*="${prevId}"]`);
  if (sel) sel.style.cssText = sel.style.cssText.replace(/color:[^;]+;background:[^;]+/, statoStyle(nuovoStato));
  toast('Stato aggiornato!', 'success');
}

let prevStatusFilter = 'tutti';
let _prevSearchQ = '';

// Costruisce lista mesi unici dai preventivi esistenti
function buildMesiDisponibili() {
  const mesi = {};
  preventivi.forEach(p => {
    const d = p.createdAt?.toDate ? p.createdAt.toDate() : new Date(p.createdAt || Date.now());
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
    mesi[key] = label.charAt(0).toUpperCase() + label.slice(1);
  });
  return Object.entries(mesi)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .map(([val, label]) => ({ val, label }));
}

// Applica tutti i filtri combinati: mese + stato + ricerca testo
function applicaFiltriPreventivi() {
  const oggi = new Date(); oggi.setHours(0,0,0,0);
  let list = preventivi;

  // Filtro mese
  if (_prevMeseFiltro) {
    list = list.filter(p => {
      const d = p.createdAt?.toDate ? p.createdAt.toDate() : new Date(p.createdAt || 0);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return key === _prevMeseFiltro;
    });
  }

  // Filtro stato (incluso 'scaduti')
  if (prevStatusFilter === 'scaduti') {
    list = list.filter(p => {
      if (!p.validoFino || p.stato === 'accettato' || p.stato === 'rifiutato') return false;
      return new Date(p.validoFino) < oggi;
    });
  } else if (prevStatusFilter !== 'tutti') {
    list = list.filter(p => p.stato === prevStatusFilter);
  }

  // Filtro ricerca testo
  if (_prevSearchQ) {
    const ql = _prevSearchQ.toLowerCase();
    list = list.filter(p => {
      const cl = clienti.find(c => c.id === p.clienteId);
      const name = cl ? `${cl.cognome} ${cl.nome}` : p.clienteNome || '';
      return name.toLowerCase().includes(ql) || (p.numero||'').toLowerCase().includes(ql);
    });
  }

  renderPreventiviTable(list);
}

function filtraMese(val) {
  _prevMeseFiltro = val;
  applicaFiltriPreventivi();
}

function filterPrevByStatus(status, btn) {
  prevStatusFilter = status;
  // Aggiorna stile bottoni
  document.querySelectorAll('[id^="fbtn-"]').forEach(b => {
    b.className = 'btn btn-sm btn-secondary';
    if (b.id === 'fbtn-scaduti') b.style.cssText = 'border-color:var(--danger);color:var(--danger)';
  });
  if (btn) {
    btn.className = 'btn btn-sm btn-primary';
    btn.style.cssText = '';
  }
  applicaFiltriPreventivi();
}

function filterPreventivi(q) {
  _prevSearchQ = q;
  applicaFiltriPreventivi();
}

function calcMq(it) {
  // Se l'utente ha inserito manualmente i m², usa quello
  if (it.mqManuale !== null && it.mqManuale !== undefined && it.mqManuale > 0) return it.mqManuale;
  const largM = (parseInt(it.larghezza)||0) / 1000;
  const altM  = (parseInt(it.altezza)||0)  / 1000;
  const mqRaw = largM * altM;
  // Arrotonda al mezzo metro quadro superiore (0.50)
  // es: 2.10 → 2.50 | 2.51 → 3.00 | 2.75 → 3.00 | 3.00 → 3.00
  return Math.ceil(mqRaw * 2) / 2;
}

function calcLineTotal(it) {
  const um = it.um || 'pz';
  if (um === 'mq') {
    const mq = calcMq(it);
    return parseFloat((it.prezzo * mq * (it.qty||1)).toFixed(2));
  } else if (um === 'ml') {
    const lungM = (parseInt(it.larghezza)||0) / 1000;
    return parseFloat((it.prezzo * lungM * (it.qty||1)).toFixed(2));
  } else {
    return parseFloat((it.prezzo * (it.qty||1)).toFixed(2));
  }
}

    } else if (um === 'ml') {

function toggleNuovoClienteInline() {
  const box = document.getElementById('nuovo-cliente-inline');
  if (box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
  setTimeout(() => document.getElementById('nc-cognome')?.focus(), 50);
}

async function salvaClienteRapido() {
  const cognome = document.getElementById('nc-cognome')?.value.trim();
  if (!cognome) { toast('Inserisci almeno il cognome', 'error'); return; }
  const data = {
    cognome,
    nome: document.getElementById('nc-nome')?.value || '',
    telefono: document.getElementById('nc-tel')?.value || '',
    email: document.getElementById('nc-email')?.value || '',
    indirizzo: document.getElementById('nc-addr')?.value || '',
    citta: '', azienda: '', note: '',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  const ref = await db.collection('clienti').add(data);
  await loadClienti();
  // Aggiunge la nuova opzione nel select e la seleziona
  const sel = document.getElementById('pv-cliente');
  if (sel) {
    const opt = document.createElement('option');
    opt.value = ref.id;
    opt.textContent = `${cognome} ${data.nome}`.trim();
    opt.selected = true;
    sel.appendChild(opt);
  }
  // Chiude il pannello
  const box = document.getElementById('nuovo-cliente-inline');
  if (box) box.style.display = 'none';
  toast(`Cliente "${cognome}" creato e selezionato!`, 'success');
}

function updateScontoTipo(v) { _prevSconto.tipo = v; if(v==='nessuno') _prevSconto.valore=0; renderPreventivoItems(); }
function updateScontoValore(v) { _prevSconto.valore = parseFloat(v)||0; renderPreventivoItems(); }

function updateItemQty(i, v) {
  preventivoItems[i].qty = parseInt(v) || 1;
  refreshItemTotals(i);
}
function updateItemDim(i, campo, v) {
  const valNum = parseInt(v);
  preventivoItems[i][campo] = isNaN(valNum) ? 0 : valNum;
  const um = preventivoItems[i].um || 'pz';
  if (um === 'mq') {
    const hasManualeOverride = preventivoItems[i].mqManuale > 0;
    if (!hasManualeOverride) {
      const largMm = preventivoItems[i].larghezza || 0;
      const altMm  = preventivoItems[i].altezza  || 0;
      const mqRaw  = (largMm / 1000) * (altMm / 1000);
      const mqArrot = Math.ceil(mqRaw * 2) / 2;
      const badge = document.getElementById('mq-badge-'+i);
      if (badge) badge.value = mqArrot.toFixed(2);
      // aggiorna anche il testo raw→arrot
      const info = document.getElementById('mq-info-'+i);
      if (info) info.textContent = mqRaw.toFixed(2) + ' m² → arrot. ' + mqArrot.toFixed(2) + ' m²';
    }
  } else if (um === 'ml') {
    const lungMm = preventivoItems[i].larghezza || 0;
    const badge = document.getElementById('mq-badge-'+i);
    if (badge) badge.value = (lungMm/1000).toFixed(2);
  }
  refreshItemTotals(i);
}
function updateItemMqManuale(i, v) {
  preventivoItems[i].mqManuale = parseFloat(v) || 0;
  refreshItemTotals(i);
}
function resetMqManuale(i) {
  preventivoItems[i].mqManuale = null;
  renderPreventivoItems(); // ricostruisce con calcolo auto
}
function duplicaRiga(i) {
  const orig = preventivoItems[i];
  const copia = JSON.parse(JSON.stringify(orig));
  copia.larghezza = null;
  copia.altezza = null;
  copia.mqManuale = null;
  copia.descrizioneRiga = '';
  copia._copia = true;
  preventivoItems.splice(i + 1, 0, copia);
  renderPreventivoItems();
  toast('Riga duplicata — inserisci le nuove misure', 'info');
}
function updateItemDescRiga(i, v) { preventivoItems[i].descrizioneRiga = v; }
function removeItem(i) { preventivoItems.splice(i, 1); renderPreventivoItems(); }

function refreshItemTotals(i) {
  // Aggiorna solo il totale della riga e il riepilogo finale, senza ricostruire il DOM
  const lineTotal = calcLineTotal(preventivoItems[i]);
  const el = document.getElementById('item-total-'+i);
  if (el) el.textContent = fmt(lineTotal);
  // Ricalcola totale generale
  updateTotaleBox();
}

function updateTotaleBox() {
  const totBox = document.getElementById('pv-totale-box');
  if (!totBox || !preventivoItems.length) return;
  const iva = companyData.iva || 22;
  const subtot = preventivoItems.reduce((s, it) => s + calcLineTotal(it), 0);
  let scontoAmt = 0;
  if (_prevSconto.tipo === 'perc' && _prevSconto.valore > 0) scontoAmt = subtot * _prevSconto.valore / 100;
  else if (_prevSconto.tipo === 'fisso' && _prevSconto.valore > 0) scontoAmt = Math.min(_prevSconto.valore, subtot);
  const imponibile = subtot - scontoAmt;
  const ivaAmt = imponibile * iva / 100;
  const totale = imponibile + ivaAmt;
  const scontoSelected = (v) => _prevSconto.tipo === v ? 'selected' : '';
  totBox.innerHTML = `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:12px">
      <div style="font-size:0.8rem;font-weight:600;color:var(--text2);margin-bottom:10px;letter-spacing:0.5px;text-transform:uppercase">🏷️ Sconto Cliente</div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <select class="form-select" style="width:160px" onchange="updateScontoTipo(this.value)">
          <option value="nessuno" ${scontoSelected('nessuno')}>Nessuno sconto</option>
          <option value="perc" ${scontoSelected('perc')}>Sconto %</option>
          <option value="fisso" ${scontoSelected('fisso')}>Sconto importo fisso €</option>
        </select>
        ${_prevSconto.tipo !== 'nessuno' ? `
        <input class="form-input" type="number" min="0" step="1" style="width:130px"
          placeholder="${_prevSconto.tipo === 'perc' ? 'Es. 10 (%)' : 'Es. 200 (€)'}"
          value="${_prevSconto.valore||''}"
          onchange="updateScontoValore(this.value)">
        <span style="color:var(--gold-dark);font-weight:700;font-size:0.95rem">
          − ${_prevSconto.tipo === 'perc' ? _prevSconto.valore+'%' : ''} ${fmt(scontoAmt)}
        </span>` : ''}
      </div>
    </div>
    <div class="totale-box">
      <div class="totale-row" style="margin-bottom:6px"><span style="color:rgba(255,255,255,0.6)">Subtotale</span><span>${fmt(subtot)}</span></div>
      ${scontoAmt > 0 ? `<div class="totale-row" style="margin-bottom:6px"><span style="color:#7DCEA0">Sconto</span><span style="color:#7DCEA0">− ${fmt(scontoAmt)}</span></div>` : ''}
      <div class="totale-row" style="margin-bottom:6px"><span style="color:rgba(255,255,255,0.6)">Imponibile</span><span>${fmt(imponibile)}</span></div>
      <div class="totale-row" style="margin-bottom:12px"><span style="color:rgba(255,255,255,0.6)">IVA ${iva}%</span><span>${fmt(ivaAmt)}</span></div>
      <div class="totale-row"><span style="font-size:0.9rem">TOTALE</span><span class="totale-final">${fmt(totale)}</span></div>
    </div>`;
}

function renderPickerGrid(list) {
  const grid = document.getElementById('picker-grid');
  if (!grid) return;
  if (!list.length) { grid.innerHTML = `<div class="empty-state"><p>Nessun prodotto trovato</p></div>`; return; }
  grid.innerHTML = list.map(p => `
    <div class="product-pick-card ${window._pickerSelected[p.id]?'selected':''}" onclick="togglePick('${p.id}')">
      ${p.foto ? `<div style="height:80px;border-radius:6px;overflow:hidden;margin-bottom:8px;background:var(--surface2)"><img src="${p.foto}" style="width:100%;height:100%;object-fit:cover"></div>` : ''}
      <div class="product-pick-name">${p.nome}</div>
      <div class="product-pick-cat">${p.categoria||''} · ${p.materiale||''}</div>
      <div class="product-pick-price">${fmt(p.prezzo)} / ${p.um||'pz'}</div>
      ${p.descrizione ? `<div style="font-size:0.72rem;color:var(--text3);margin-top:4px;line-height:1.4">${p.descrizione.substring(0,80)}${p.descrizione.length>80?'...':''}</div>` : ''}

}

function togglePick(id) {
  window._pickerSelected[id] = !window._pickerSelected[id];
  renderPickerGrid(prodotti);
}

function filterPickerProducts(q) {
  renderPickerGrid(prodotti.filter(p => (p.nome+p.categoria+p.materiale).toLowerCase().includes(q.toLowerCase())));
}

function confirmProductPick() {
  const picked = Object.keys(window._pickerSelected).filter(id => window._pickerSelected[id]);
  if (!picked.length) { toast('Seleziona almeno un prodotto', 'error'); return; }
  picked.forEach(id => {
    const p = prodotti.find(x => x.id === id);
    if (p) {
      // Permette lo stesso prodotto più volte (misure diverse)
      preventivoItems.push({
        prodottoId: id, nome: p.nome, categoria: p.categoria,
        materiale: p.materiale, prezzo: p.prezzo, um: p.um || 'pz',
        foto: p.foto || null, descrizione: p.descrizione || '',
        sistema: p.sistema || '', coloreProfili: p.coloreProfili || '',
        coloreAccessori: p.coloreAccessori || '', altezzaManiglia: p.altezzaManiglia || null,
        tamponamento: p.tamponamento || '',
        qty: 1, larghezza: null, altezza: null, mqManuale: null, descrizioneRiga: ''
      });
    }
  });
  closeModal(); // chiude solo il picker, la modal preventivo rimane aperta
  renderPreventivoItems(); // aggiorna la lista nella modal sotto
  toast(`${picked.length} prodotto${picked.length>1?'i':''} aggiunto${picked.length>1?'i':''}!`, 'success');
}

// ════════════════════════════════════════════
//  SISTEMA BOZZE LOCALI — salvataggio sicuro
// ════════════════════════════════════════════
const BOZZE_KEY = 'infissipro_bozze';

function salvaBozzaLocale(id, data) {
  try {
    const bozze = JSON.parse(localStorage.getItem(BOZZE_KEY) || '{}');
    const chiave = id || ('new_' + Date.now());
    bozze[chiave] = { id, data, ts: Date.now(), _chiave: chiave };
    localStorage.setItem(BOZZE_KEY, JSON.stringify(bozze));
    return chiave;
  } catch(e) { console.warn('Impossibile salvare bozza locale:', e); return null; }
}

function rimuoviBozzaLocale(chiave) {
  try {
    const bozze = JSON.parse(localStorage.getItem(BOZZE_KEY) || '{}');
    delete bozze[chiave];
    localStorage.setItem(BOZZE_KEY, JSON.stringify(bozze));
  } catch(e) {}
}

function getBozzeLocali() {
  try {
    return Object.values(JSON.parse(localStorage.getItem(BOZZE_KEY) || '{}'));
  } catch(e) { return []; }
}

async function sincronizzaBozzeInSospeso() {
  const bozze = getBozzeLocali();
  if (!bozze.length) return;
  let sincronizzate = 0;
  for (const bozza of bozze) {
    try {
      const d = { ...bozza.data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
      if (bozza.id) {
        await db.collection('preventivi').doc(bozza.id).update(d);
      } else {
        const countSnap = await db.collection('preventivi').get();
        d.numero = String(countSnap.size + 1).padStart(4, '0');
        d.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('preventivi').add(d);
      }
      rimuoviBozzaLocale(bozza._chiave);
      sincronizzate++;
    } catch(e) { /* lascia la bozza per dopo */ }
  }
  if (sincronizzate > 0) {
    aggiornaBadgeBozze();
    toast(`✅ ${sincronizzate} preventivo${sincronizzate>1?'i':''} recuperato${sincronizzate>1?'i':''} dalla bozza locale!`, 'success');
    renderPreventivi();
  }
}

  openModal(`

async function savePreventivo(id) {
  const clienteId = document.getElementById('pv-cliente').value;
  if (!clienteId) { toast('Seleziona un cliente', 'error'); return; }
  if (!preventivoItems.length) { toast('Aggiungi almeno un prodotto', 'error'); return; }

  const iva = companyData.iva || 22;
  const subtotale = preventivoItems.reduce((s, it) => s + calcLineTotal(it), 0);
  let scontoAmt = 0;
  if (_prevSconto.tipo === 'perc' && _prevSconto.valore > 0) scontoAmt = subtotale * _prevSconto.valore / 100;
  else if (_prevSconto.tipo === 'fisso' && _prevSconto.valore > 0) scontoAmt = Math.min(_prevSconto.valore, subtotale);
  const imponibile = subtotale - scontoAmt;
  const ivaAmt = imponibile * iva / 100;
  const totaleFinale = imponibile + ivaAmt;
  const cl = clienti.find(c => c.id === clienteId);

  const prefisso = document.getElementById('pv-prefisso')?.value.trim() || String(new Date().getFullYear());
  const validoFino = document.getElementById('pv-validita')?.value || null;
  const noteInterne = document.getElementById('pv-note-interne')?.value || '';
  const tempiConsegna = document.getElementById('pv-tempi')?.value || '';
  const pagamenti = document.getElementById('pv-pagamenti')?.value || '';

  // Rimuovi foto base64 dagli items (Firestore limite 1MB)
  const itemsPerSalvataggio = preventivoItems.map(it => {
    const { foto, ...itemSenzaFoto } = it;
    return itemSenzaFoto;
  });

  // Controllo dimensione
  if (JSON.stringify(itemsPerSalvataggio).length > 900000) {
    toast('⚠ Preventivo troppo grande. Riduci il numero di prodotti.', 'error');
    return;
  }

  const data = {
    clienteId,
    clienteNome: cl ? `${cl.cognome} ${cl.nome}` : '',
    stato: document.getElementById('pv-stato').value,
    note: document.getElementById('pv-note').value,
    noteInterne, tempiConsegna, pagamenti,
    numeroPrefisso: prefisso, validoFino,
    items: itemsPerSalvataggio,
    subtotale, scontoAmt, scontoTipo: _prevSconto.tipo, scontoValore: _prevSconto.valore,
    imponibile, ivaAmt, totaleFinale, ivaPerc: iva,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  // ── LIVELLO 1: salva subito in localStorage ──
  const chiaveBozza = salvaBozzaLocale(id, data);

  // Feedback sul bottone
  const saveBtn = document.getElementById('btn-salva-preventivo');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ Salvataggio...'; }

  // ── LIVELLO 2: salva su Firebase con 3 tentativi ──
  const MAX_TENTATIVI = 3;
  let ultimoErrore = null;

  for (let tentativo = 1; tentativo <= MAX_TENTATIVI; tentativo++) {
    try {
      if (tentativo > 1) {
        if (saveBtn) saveBtn.textContent = `⏳ Tentativo ${tentativo}/${MAX_TENTATIVI}...`;
        await firebase.firestore().enableNetwork();
        await new Promise(r => setTimeout(r, tentativo * 1000));
      }

      if (id) {
        await db.collection('preventivi').doc(id).update(data);
      } else {
        const countSnap = await db.collection('preventivi').get();
        data.numero = String(countSnap.size + 1).padStart(4, '0');
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('preventivi').add(data);
      }

      // ✅ Successo — rimuovi bozza locale e chiudi
      rimuoviBozzaLocale(chiaveBozza);
      aggiornaBadgeBozze();
      toast(id ? 'Preventivo aggiornato!' : 'Preventivo salvato!', 'success');
      closeModal();
      renderPreventivi();
      return;

    } catch(err) {
      ultimoErrore = err;
      console.warn(`Tentativo ${tentativo} fallito:`, err.code, err.message);
    }
  }

  // ── LIVELLO 3: tutti i tentativi falliti — dati al sicuro in locale ──
  console.error('Salvataggio Firebase fallito dopo 3 tentativi:', ultimoErrore);
  if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 Salva Preventivo'; }

  // Mostra avviso con opzione di recupero
  openModal(`
    <div class="modal-header">
      <h2 class="modal-title" style="color:var(--danger)">⚠️ Problema di connessione</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="background:#FFF8E1;border:1px solid #FFD54F;border-radius:8px;padding:16px;margin-bottom:16px">
        <div style="font-weight:700;margin-bottom:6px">✅ I tuoi dati sono al sicuro</div>
        <div style="font-size:0.88rem;color:var(--text2)">
          Il preventivo è stato salvato localmente su questo dispositivo. 
          Non hai perso nulla.
        </div>
      </div>
      <div style="font-size:0.88rem;color:var(--text2);margin-bottom:12px">
        <strong>Errore:</strong> ${ultimoErrore?.message || ultimoErrore?.code || 'Connessione a Firebase non disponibile'}
      </div>
      <div style="font-size:0.88rem;color:var(--text2)">
        Quando la connessione torna, clicca <strong>"Riprova sincronizzazione"</strong> per salvare su Firebase.
      </div>
    </div>
    <div class="modal-footer" style="flex-wrap:wrap;gap:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Chiudi — riprovo dopo</button>
      <button class="btn btn-primary" onclick="closeModal();sincronizzaBozzeInSospeso()">
        ☁️ Riprova sincronizzazione
      </button>
    </div>`);
}

// ── DUPLICA PREVENTIVO ──
async function duplicaPreventivo(id) {
  if (!confirm('Duplicare questo preventivo come nuova bozza?')) return;
  toast('Duplicazione in corso...', 'info');
  await Promise.all([loadPreventivi(), loadClienti()]);
  const orig = preventivi.find(p => p.id === id);
  if (!orig) { toast('Preventivo non trovato', 'error'); return; }

  const countSnap = await db.collection('preventivi').get();
  const nuovoNumero = String(countSnap.size + 1).padStart(4, '0');

  const data = {
    clienteId: orig.clienteId,
    clienteNome: orig.clienteNome,
    stato: 'bozza',
    note: orig.note || '',
    noteInterne: orig.noteInterne || '',
    items: JSON.parse(JSON.stringify(orig.items || [])),
    subtotale: orig.subtotale || 0,
    scontoAmt: orig.scontoAmt || 0,
    scontoTipo: orig.scontoTipo || 'nessuno',
    scontoValore: orig.scontoValore || 0,
    imponibile: orig.imponibile || 0,
    ivaAmt: orig.ivaAmt || 0,
    totaleFinale: orig.totaleFinale || 0,
    ivaPerc: orig.ivaPerc || 22,
    numero: nuovoNumero,
    numeroPrefisso: orig.numeroPrefisso || '',
    validoFino: null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  await db.collection('preventivi').add(data);
  toast(`Preventivo duplicato come #${nuovoNumero} — Bozza!`, 'success');
  renderPreventivi();
}

async function deletePreventivo(id) {
  if (!confirm('Eliminare questo preventivo?')) return;
  await db.collection('preventivi').doc(id).delete();
  toast('Preventivo eliminato', 'info');
  renderPreventivi();
}

// ════════════════════════════════════════════
//  PDF GENERATION
// ════════════════════════════════════════════
async function generatePDF(prevId) {
  await Promise.all([loadPreventivi(), loadClienti(), loadCompany()]);
  const prev = preventivi.find(p => p.id === prevId);
  if (!prev) { toast('Preventivo non trovato', 'error'); return; }
  const cl = clienti.find(c => c.id === prev.clienteId) || {};

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210; const M = 15;
  let y = M;

  // ── Funzione helper: nuova pagina con header ripetuto ──
  function newPage() {
    doc.addPage();
    y = 15;
    // linea separatrice top
    doc.setDrawColor(220,220,220);
    doc.line(M, y+2, W-M, y+2);
    doc.setFont('helvetica','italic'); doc.setFontSize(7); doc.setTextColor(160,155,150);
    doc.text(companyData.nome||'', M, y+7);
    const numP = prev.numeroPrefisso ? `${prev.numeroPrefisso}/${prev.numero||prevId.slice(-4)}` : (prev.numero||prevId.slice(-6));
    doc.text(`Preventivo N° ${numP}`, W-M, y+7, {align:'right'});
    y += 12;
  }

  // ════════════════════════
  // HEADER — Logo + dati azienda
  // ════════════════════════
  const headerH = 38;
  doc.setFillColor(255,255,255);

  // Logo a sinistra
  if (companyData.logoBase64) {
    try {
      const ext = companyData.logoBase64.includes('png') ? 'PNG' : 'JPEG';
      doc.addImage(companyData.logoBase64, ext, M, y, 55, 28, '', 'FAST');
    } catch(e) {}
  }

  // Dati azienda a destra del logo
  const ax = M + 60;
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(20,20,20);
  doc.text(companyData.nome||'', ax, y+6);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(60,60,60);
  const aLines = [
    companyData.indirizzo||'',
    companyData.telefono ? `Tel. ${companyData.telefono}` : '',
    companyData.piva ? `P. iva ${companyData.piva}` : '',
    companyData.email||'', companyData.sito||''
  ].filter(Boolean);
  aLines.forEach((l,i) => doc.text(l, ax, y+12+i*5));

  y += headerH;

  // Linea separatrice
  doc.setDrawColor(180,180,180); doc.setLineWidth(0.3);
  doc.line(M, y, W-M, y); y += 6;

  // ════════════════════════
  // INTESTAZIONE PREVENTIVO
  // ════════════════════════
  const numPDF = prev.numeroPrefisso ? `${prev.numeroPrefisso}/${prev.numero||prevId.slice(-4)}` : (prev.numero||prevId.slice(-6).toUpperCase());
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(20,20,20);
  doc.text(`Preventivo n° ${numPDF} del ${fmtDate(prev.createdAt)}`, M, y+5);

  // Cliente sulla stessa riga, allineato a destra
  const nomeCliente = `${cl.cognome||''} ${cl.nome||''}`.trim() || prev.clienteNome || '';
  const cellTxt = cl.telefono ? ` – cell. ${cl.telefono}` : '';
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text(`Cliente: ${nomeCliente}${cellTxt}`, M, y+12);
  if (cl.indirizzo || cl.citta) {
    doc.setFontSize(8); doc.setTextColor(80,80,80);
    doc.text([cl.indirizzo, cl.citta].filter(Boolean).join(', '), M, y+18);
  }

  // Validità offerta
  if (prev.validoFino) {
    doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.setTextColor(120,80,20);
    const vd = new Date(prev.validoFino).toLocaleDateString('it-IT');
    doc.text(`Validità offerta: fino al ${vd}`, W-M, y+5, {align:'right'});
  }

  y += 24;

  // ════════════════════════
  // TESTO INTRODUTTIVO (note per cliente)
  // ════════════════════════
  if (prev.note) {
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(30,30,30);
    const introLines = doc.splitTextToSize(prev.note, W-2*M);
    doc.text(introLines, M, y);
    y += introLines.length * 5 + 4;
  }

  // ════════════════════════
  // TABELLA PRODOTTI — layout Simeoli
  // ════════════════════════
  const colPos  = M;         // Pos.  width=10
  const colImg  = M+11;      // Immagine+misure  width=38
  const colDesc = M+51;      // Descrizione  width=100
  const colTot  = W-M-2;     // Totale (right-aligned)
  const tableW  = W-2*M;

  // Header tabella — bordo nero, sfondo bianco, testo nero
  doc.setFillColor(255,255,255);
  doc.setDrawColor(30,30,30); doc.setLineWidth(0.5);
  doc.rect(M, y, tableW, 7, 'FD');
  doc.setTextColor(20,20,20); doc.setFont('helvetica','bold'); doc.setFontSize(8);
  doc.text('Pos.', colPos+1, y+5);
  doc.text('Struttura', colImg+1, y+5);
  doc.text('Descrizione', colDesc+1, y+5);
  doc.text('Totale', colTot, y+5, {align:'right'});
  y += 7;

  let subtot = 0;
  (prev.items || []).forEach((it, idx) => {
    // Calcola totale riga
    const um = it.um || 'pz';
    let lineTotal = 0;
    let dimStr = '';
    let superfStr = '';
    let mqVal = 0;
    if (um === 'mq') {
      const largMm = parseInt(it.larghezza)||0;
      const altMm  = parseInt(it.altezza)||0;
      const mqRaw = (largMm/1000) * (altMm/1000);
      // Usa mqManuale se impostato, altrimenti arrotonda al centesimo superiore
      // Arrotonda al mezzo m² superiore (0.50)
      mqVal = (it.mqManuale > 0) ? it.mqManuale : Math.ceil(mqRaw * 2) / 2;
      lineTotal = parseFloat((it.prezzo * mqVal * (it.qty||1)).toFixed(2));
      dimStr = `L ${largMm} x h${altMm} mm`;
      superfStr = `mq ${mqVal.toFixed(2)} x ${fmt(it.prezzo).replace('€','').trim()} €/mq`;
    } else if (um === 'ml') {
      const lungMm = parseInt(it.larghezza)||0;
      lineTotal = parseFloat((it.prezzo * (lungMm/1000) * (it.qty||1)).toFixed(2));
      dimStr = `${lungMm} mm`;
    } else {
      lineTotal = parseFloat((it.prezzo * (it.qty||1)).toFixed(2));
    }
    subtot += lineTotal;

    // Costruisci le righe di testo descrizione
    const descLines = [];
    descLines.push(`Q.ta ${it.qty||1}`);
    descLines.push(''); // spazio
    // Nome prodotto in grassetto (lo facciamo dopo)
    if (it.descrizioneRiga) descLines.push(`(${it.descrizioneRiga})`);
    if (dimStr) descLines.push(`Misure: ${dimStr}.`);
    if (superfStr) descLines.push(superfStr);
    if (it.sistema) descLines.push(`Sistema: ${it.sistema}`);
    if (it.coloreProfili) descLines.push(`Colore struttura:`);
    if (it.coloreProfili) descLines.push(it.coloreProfili);
    if (it.coloreAccessori) descLines.push(`Apertura: ${it.coloreAccessori}`);
    if (it.altezzaManiglia) descLines.push(`Alt. maniglia: ${it.altezzaManiglia} mm`);
    if (it.tamponamento) {
      const tl = doc.splitTextToSize(it.tamponamento, 95);
      tl.forEach(t => descLines.push(t));
    }

    // Altezza riga: max tra immagine (40mm) e testo
    const textH = descLines.length * 4.5 + 14; // 14 per il nome prodotto bold + padding
    const imgH = 38; // area immagine
    const rowH = Math.max(textH, imgH) + 8;

    // Controllo page break
    if (y + rowH > 270) newPage();

    // Sfondo riga alternato
    if (idx % 2 === 0) { doc.setFillColor(252,252,252); } else { doc.setFillColor(245,245,245); }
    doc.rect(M, y, tableW, rowH, 'F');

    // Bordo riga
    doc.setDrawColor(210,210,210); doc.setLineWidth(0.2);
    doc.rect(M, y, tableW, rowH, 'S');

    // Colonna Pos.
    doc.setFillColor(220,220,220);
    doc.rect(colPos, y, 10, rowH, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(30,30,30);
    doc.text(String(idx+1), colPos+5, y+rowH/2+1, {align:'center'});

    // Colonna immagine
    doc.setDrawColor(200,200,200);
    doc.rect(colImg, y+2, 36, imgH, 'S');
    // Foto: prendi dall'item o dal catalogo prodotti (le foto non sono salvate su Firestore)
    const fotoSrc = it.foto || prodotti.find(p => p.id === it.prodottoId)?.foto || null;
    if (fotoSrc) {
      try {
        const ext2 = fotoSrc.includes('png')||fotoSrc.includes('PNG') ? 'PNG' : 'JPEG';
        doc.addImage(fotoSrc, ext2, colImg+1, y+3, 34, imgH-2, '', 'FAST');
      } catch(e) {
        doc.setFontSize(7); doc.setTextColor(160,160,160);
        doc.text('img', colImg+18, y+imgH/2+2, {align:'center'});
      }
    }

    // Misure sotto immagine
    if (dimStr) {
      doc.setFont('helvetica','bold'); doc.setFontSize(6.5); doc.setTextColor(40,40,40);
      const largMm2 = parseInt(it.larghezza)||0;
      const altMm2 = parseInt(it.altezza)||0;
      if (largMm2) doc.text(`Larghezza: ${largMm2} mm`, colImg+1, y+imgH+6);
      if (altMm2)  doc.text(`Altezza: ${altMm2} mm`, colImg+1, y+imgH+11);
    }

    // Colonna descrizione
    let dy = y + 6;
    // Nome prodotto bold
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(20,20,20);
    const nomeLines = doc.splitTextToSize(it.nome, 92);
    nomeLines.forEach(nl => { doc.text(nl, colDesc+2, dy); dy += 5; });

    // Resto descrizione normale
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(50,50,50);
    descLines.forEach((dl, dli) => {
      if (!dl) { dy += 2; return; } // riga vuota = spazio
      if (dli === 0) return; // salta Q.ta già gestita dopo
      doc.text(dl, colDesc+2, dy);
      dy += 4.5;
    });

    // Q.ta in alto a destra della colonna descrizione
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(20,20,20);
    doc.text(`Q.ta ${it.qty||1}`, colTot-20, y+6, {align:'right'});

    // Totale riga
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(20,20,20);
    doc.text(fmt(lineTotal), colTot, y+rowH/2+1, {align:'right'});

    y += rowH;
  });

  // ════════════════════════
  // TOTALI
  // ════════════════════════
  if (y + 60 > 270) newPage();
  y += 4;

  const scontoAmt = prev.scontoAmt || 0;
  const imponibile = subtot - scontoAmt;
  const ivaAmt = imponibile * (prev.ivaPerc||22) / 100;
  const totale = imponibile + ivaAmt;

  const totLabelX = W - M - 65;
  const totValX = W - M - 2;

  // Linea totali
  doc.setDrawColor(30,30,30); doc.setLineWidth(0.5);
  doc.line(totLabelX-2, y, W-M, y); y += 2;

  if (scontoAmt > 0) {
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(60,60,60);
    doc.text('Subtotale:', totLabelX, y+6); doc.text(fmt(subtot), totValX, y+6, {align:'right'});
    doc.setTextColor(39,130,80);
    const sLab = prev.scontoTipo==='perc' ? `Sconto ${prev.scontoValore}%:` : 'Sconto:';
    doc.text(sLab, totLabelX, y+12); doc.text('- '+fmt(scontoAmt), totValX, y+12, {align:'right'});
    doc.setTextColor(60,60,60);
    doc.text('Imponibile:', totLabelX, y+18); doc.text(fmt(imponibile), totValX, y+18, {align:'right'});
    doc.text(`IVA ${prev.ivaPerc||22}%:`, totLabelX, y+24); doc.text(fmt(ivaAmt), totValX, y+24, {align:'right'});
    y += 28;
  } else {
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(60,60,60);
    doc.text('Imponibile:', totLabelX, y+6); doc.text(fmt(imponibile), totValX, y+6, {align:'right'});
    doc.text(`IVA ${prev.ivaPerc||22}%:`, totLabelX, y+12); doc.text(fmt(ivaAmt), totValX, y+12, {align:'right'});
    y += 16;
  }

  // Box TOTALE FINALE
  doc.setFillColor(20,20,20);
  doc.rect(totLabelX-2, y, W-M-totLabelX+4, 10, 'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('TOTALE', totLabelX+2, y+7);
  doc.text(fmt(totale), totValX, y+7, {align:'right'});
  y += 16;

  // ════════════════════════
  // CONDIZIONI (note azienda + pagamenti)
  // ════════════════════════
  if (companyData.note) {
    if (y + 20 > 260) newPage();
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(20,20,20);
    doc.text('Condizioni:', M, y+5);
    doc.setFont('helvetica','normal');
    const noteLines = doc.splitTextToSize(companyData.note, W-2*M);
    doc.text(noteLines, M, y+11);
    y += noteLines.length * 4.5 + 14;
  }

  // ════════════════════════
  // TEMPI DI CONSEGNA E PAGAMENTI
  // ════════════════════════
  if (prev.tempiConsegna || prev.pagamenti) {
    if (y + 30 > 260) newPage();
    y += 4;
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.2);
    doc.line(M, y, W-M, y); y += 5;

    if (prev.tempiConsegna) {
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(20,20,20);
      doc.text('Tempi di Consegna:', M, y);
      doc.setFont('helvetica','normal');
      const tLines = doc.splitTextToSize(prev.tempiConsegna, W-2*M-5);
      doc.text(tLines, M, y+5);
      y += tLines.length * 4.5 + 8;
    }

    if (prev.pagamenti) {
      if (y + 20 > 260) newPage();
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(20,20,20);
      doc.text('Pagamenti:', M, y);
      doc.setFont('helvetica','normal');
      const pLines = doc.splitTextToSize(prev.pagamenti, W-2*M-5);
      doc.text(pLines, M, y+5);
      y += pLines.length * 4.5 + 8;
    }
  }

  // ════════════════════════
  // FIRME
  // ════════════════════════
  if (y + 35 > 270) newPage();
  y += 6;

  doc.setDrawColor(150,150,150); doc.setLineWidth(0.3);

  // Firma impresa
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(30,30,30);
  doc.text("Firma dell'impresa", M, y);
  // Firma digitale se presente
  if (prev.firmaBase64) {
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(80,80,80);
    if (prev.firmatoIl) doc.text(`Firmato il: ${new Date(prev.firmatoIl).toLocaleDateString('it-IT')}`, M, y+5);
    try { doc.addImage(prev.firmaBase64, 'PNG', M, y+7, 50, 18, '', 'FAST'); } catch(e) {}
  }
  doc.line(M, y+28, M+60, y+28);
  doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.setTextColor(40,40,40);
  doc.text(companyData.nome||'', M, y+34);

  // Firma committente
  const fx2 = W - M - 65;
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(30,30,30);
  doc.text('Firma del committente', fx2, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(60,60,60);
  doc.text('per accettazione', fx2, y+5);
  doc.line(fx2, y+28, fx2+65, y+28);
  doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.setTextColor(40,40,40);
  const nomeClFirma = `${cl.cognome||''} ${cl.nome||''}`.trim() || prev.clienteNome || '';
  doc.text(nomeClFirma, fx2, y+34);

  y += 40;

  // ════════════════════════
  // FOOTER su ogni pagina
  // ════════════════════════
  const totalPages = doc.getNumberOfPages();
  for (let pg = 1; pg <= totalPages; pg++) {
    doc.setPage(pg);
    const pageH = 297;
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.2);
    doc.line(M, pageH-12, W-M, pageH-12);
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(140,135,130);
    const footParts = [companyData.nome, companyData.indirizzo, companyData.telefono].filter(Boolean);
    doc.text(footParts.join('  –  '), W/2, pageH-7, {align:'center'});
    doc.text(`Pag. ${pg}/${totalPages}`, W-M, pageH-7, {align:'right'});
  }

  const filename = `Preventivo_${prev.numero||prevId.slice(-6).toUpperCase()}.pdf`;

  // Modalità base64 — usata da eseguiInvioEmail per allegare il PDF
  if (window._pdfOutputMode === 'base64') {
    window._pdfBase64Result = doc.output('datauristring');
    return;
  }

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  if (isIOS && navigator.share) {
    // iOS con Web Share API — condivide il vero file PDF (non il link blob)
    try {
      const pdfBlob = doc.output('blob');
      const pdfFile = new File([pdfBlob], filename, { type: 'application/pdf' });
      
      // Verifica che il browser supporti la condivisione di file
      if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
        await navigator.share({
          title: filename,
          files: [pdfFile]
        });
        toast('PDF condiviso!', 'success');
      } else {
        // canShare non supporta file — fallback apertura nuova scheda
        throw new Error('canShare files not supported');
      }
    } catch(e) {
      if (e.name === 'AbortError') {
        // Utente ha annullato — nessun errore
        toast('Condivisione annullata', 'info');
      } else {
        // Fallback: apri in nuova scheda con iframe
        const pdfDataUri = doc.output('datauristring');
        const newTab = window.open('', '_blank');
        if (newTab) {
          newTab.document.write(
            '<!DOCTYPE html><html><head>'
            + '<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">'
            + '<title>' + filename + '</title>'
            + '<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:sans-serif;background:#1C1A17;display:flex;flex-direction:column;height:100vh}.bar{background:#2D2B27;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}.bar h1{color:#C9A84C;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}.btn-dl{background:#C9A84C;color:#1C1A17;padding:10px 16px;border-radius:8px;text-decoration:none;font-weight:700;font-size:13px;white-space:nowrap}iframe{flex:1;width:100%;border:none}</style>'
            + '</head><body>'
            + '<div class="bar"><h1>' + filename + '</h1>'
            + '<a class="btn-dl" href="' + pdfDataUri + '" download="' + filename + '">⬇ Scarica</a></div>'
            + '<iframe src="' + pdfDataUri + '"></iframe>'
            + '</body></html>'
          );
          newTab.document.close();
          toast('Usa il bottone ⬇ Scarica per salvare il PDF', 'success');
        } else {
          doc.save(filename);
          toast('PDF generato!', 'success');
        }
      }
    }
  } else {
    // Desktop e Android — download diretto
    doc.save(filename);
    toast('PDF generato!', 'success');
  }
}

const GMAIL_CLIENT_ID = '53831286391-nu07c6u4acdch8qnso6n9ql842q5b1gf.apps.googleusercontent.com';
const GMAIL_SENDER   = 'simeoliinfissi@gmail.com';
let _gmailToken = null;
let _gmailTokenExpiry = 0;

// Richiede il token OAuth Gmail — apre popup Google solo se necessario
async function getGmailToken() {
  // Riusa token valido se presente
  if (_gmailToken && Date.now() < _gmailTokenExpiry) return _gmailToken;

  return new Promise((resolve, reject) => {
    if (!window.google?.accounts?.oauth2) {
      reject(new Error('Libreria Google Identity Services non caricata. Ricarica la pagina.'));
      return;
    }
    // Vai direttamente al popup — niente prompt:none che causa GSI_LOGGER error
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GMAIL_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/gmail.send',
      hint: GMAIL_SENDER,
      callback: (resp) => {
        if (resp.error || !resp.access_token) {
          reject(new Error(resp.error_description || resp.error || 'Autorizzazione Gmail negata'));
          return;
        }
        _gmailToken = resp.access_token;
        _gmailTokenExpiry = Date.now() + ((resp.expires_in || 3600) - 60) * 1000;
        resolve(_gmailToken);
      },
      error_callback: (err) => {
        reject(new Error(err.type === 'popup_closed' ? 'Popup chiuso — autorizza Gmail per inviare' : err.message || 'Errore autorizzazione'));
      }
    });
    client.requestAccessToken({ prompt: 'consent' });
  });
}

// Costruisce il messaggio MIME con PDF allegato
// Usa Uint8Array per evitare doppia codifica del PDF
function buildMimeMessage(to, subject, bodyText, pdfBase64, filename) {
  const boundary = 'InfissiPro_' + Date.now();

  // Estrai il base64 puro del PDF (senza prefisso data:...)
  const pdfB64Pure = pdfBase64.replace(/^data:[^;]+;base64,/, '');

  // Codifica il testo in base64 per la parte testuale
  const bodyB64 = btoa(unescape(encodeURIComponent(bodyText)));

  // Codifica subject in base64 per supportare caratteri italiani
  const subjectB64 = '=?UTF-8?B?' + btoa(unescape(encodeURIComponent(subject))) + '?=';

  // Costruisci le parti del MIME come stringa (il PDF è già in base64 — non va ri-codificato)
  const mimeParts = [
    'MIME-Version: 1.0',
    'From: ' + GMAIL_SENDER,
    'To: ' + to,
    'Subject: ' + subjectB64,
    'Content-Type: multipart/mixed; boundary="' + boundary + '"',
    '',
    '--' + boundary,
    'Content-Type: text/plain; charset=UTF-8',
    'Content-Transfer-Encoding: base64',
    '',
    bodyB64,
    '',
    '--' + boundary,
    'Content-Type: application/pdf; name="' + filename + '"',
    'Content-Transfer-Encoding: base64',
    'Content-Disposition: attachment; filename="' + filename + '"',
    '',
    pdfB64Pure,
    '',
    '--' + boundary + '--'
  ].join('\r\n');

  // Converti in Uint8Array byte per byte (evita problemi con btoa su stringhe grandi)
  const bytes = new Uint8Array(mimeParts.length);
  for (let i = 0; i < mimeParts.length; i++) {
    bytes[i] = mimeParts.charCodeAt(i) & 0xff;
  }

  // Converti in base64url
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// Genera il PDF e restituisce il base64
async function generatePDFBase64(prevId) {
  await Promise.all([loadPreventivi(), loadClienti(), loadCompany()]);
  const prev = preventivi.find(p => p.id === prevId);
  if (!prev) throw new Error('Preventivo non trovato');

  // Chiama generatePDF ma intercetta l'output invece di salvarlo
  const { jsPDF } = window.jspdf;
  // Ri-esegue la generazione PDF e restituisce base64
  // (riuso la funzione esistente con un flag speciale)
  window._pdfOutputMode = 'base64';
  await generatePDF(prevId);
  const b64 = window._pdfBase64Result;
  window._pdfOutputMode = null;
  window._pdfBase64Result = null;
  return b64;
}

        Invia con allegato PDF

async function eseguiInvioEmail(prevId, toEmail) {
  const emailInput = document.getElementById('email-destinatario');
  if (emailInput) {
    toEmail = emailInput.value.trim();
    if (!toEmail) { toast('Inserisci un indirizzo email', 'error'); return; }
  }
  const btn = document.getElementById('btn-invia-email');
  const status = document.getElementById('email-status');
  const bodyText = document.getElementById('email-body')?.value || '';

  if (btn) { btn.disabled = true; btn.textContent = '🔐 Autorizzazione Gmail...'; }
  if (status) { status.style.display='block'; status.style.background='var(--surface2)'; status.textContent = '🔐 Autorizzazione Gmail in corso...'; }

  try {
    // 1. PRIMA richiedi il token — deve avvenire subito dopo il click
    //    altrimenti il browser blocca il popup OAuth
    const token = await getGmailToken();

    // 2. Ora genera il PDF (il popup è già stato gestito)
    if (btn) btn.textContent = '⏳ Generazione PDF...';
    if (status) status.textContent = '📄 Generazione PDF in corso...';

    await Promise.all([loadPreventivi(), loadClienti(), loadCompany()]);
    const prev = preventivi.find(p => p.id === prevId);

    window._pdfOutputMode = 'base64';
    await generatePDF(prevId);
    const pdfB64 = window._pdfBase64Result;
    window._pdfOutputMode = null;
    window._pdfBase64Result = null;

    if (!pdfB64) throw new Error('Generazione PDF fallita');

    // 3. Costruisci messaggio MIME e invia
    if (btn) btn.textContent = '📤 Invio in corso...';
    if (status) status.textContent = '📤 Invio email con PDF allegato...';

    const numPDF = prev.numeroPrefisso ? `${prev.numeroPrefisso}/${prev.numero}` : prev.numero || prevId.slice(-4);
    const subject = `Preventivo ${numPDF} – ${companyData.nome||'Simeoli Infissi'}`;
    const filename = `Preventivo_${prev.numero||prevId.slice(-4)}.pdf`;

    const mimeMsg = buildMimeMessage(toEmail, subject, bodyText, pdfB64, filename);

    // 4. Invia via Gmail API
    const resp = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ raw: mimeMsg })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || 'Errore invio');
    }

    // 5. Aggiorna stato preventivo
    await db.collection('preventivi').doc(prevId).update({
      stato: 'inviato',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    const pLocal = preventivi.find(x => x.id === prevId);
    if (pLocal) pLocal.stato = 'inviato';

    if (status) {
      status.style.background = '#EBF8F1';
      status.style.color = 'var(--success)';
      status.textContent = '✅ Email inviata con successo! Stato aggiornato a "Inviato".';
    }
    if (btn) { btn.textContent = '✅ Inviata!'; btn.style.background = 'var(--success)'; }
    toast('Email inviata con PDF allegato!', 'success');
    setTimeout(() => { closeModal(); renderPreventivi(); }, 1800);

  } catch(e) {
    console.error('Errore invio email:', e);
    if (status) {
      status.style.display = 'block';
      status.style.background = '#FDEDED';
      status.style.color = 'var(--danger)';
      status.textContent = '❌ Errore: ' + e.message;
    }
    if (btn) { btn.disabled = false; btn.textContent = 'Riprova'; }
    toast('Errore invio: ' + e.message, 'error');
  }
}

function initFirmaCanvas() {
  const canvas = document.getElementById('firma-canvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.strokeStyle = '#1C1A17';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  let drawing = false;

  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left), y: (src.clientY - r.top) };
  };
  canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, {passive:false});
  canvas.addEventListener('touchend', () => drawing = false);
}

function clearFirma() {
  const canvas = document.getElementById('firma-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

async function salvaFirma(prevId) {
  const canvas = document.getElementById('firma-canvas');
  if (!canvas) return;
  const firmaBase64 = canvas.toDataURL('image/png');
  await db.collection('preventivi').doc(prevId).update({
    firmaBase64,
    firmatoIl: new Date().toISOString(),
    stato: 'accettato',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  const p = preventivi.find(x => x.id === prevId);
  if (p) { p.firmaBase64 = firmaBase64; p.stato = 'accettato'; }
  closeModal();
  toast('Firma salvata! Stato aggiornato ad Accettato', 'success');
  renderPreventivi();
}

// ════════════════════════════════════════════
async function checkNotifiche() {
  if (!can('notifiche')) return;
  await Promise.all([loadPreventivi(), loadClienti()]);
  const oggi = new Date(); oggi.setHours(0,0,0,0);
  const alerts = [];

  preventivi.forEach(p => {
    if (p.stato === 'rifiutato' || p.stato === 'accettato') return;
    const cl = clienti.find(c => c.id === p.clienteId);
    const nome = cl ? `${cl.cognome} ${cl.nome}` : p.clienteNome || '—';
    const num = p.numeroPrefisso ? `${p.numeroPrefisso}/${p.numero}` : `#${p.numero||p.id.slice(-4)}`;

    // Scadenza vicina (≤5 giorni)
    if (p.validoFino) {
      const scad = new Date(p.validoFino);
      const diff = Math.round((scad - oggi) / (1000*60*60*24));
      if (diff >= 0 && diff <= 5) alerts.push({ tipo: 'scadenza', msg: `${num} — ${nome}: scade in ${diff} giorn${diff===1?'o':'i'}`, id: p.id });
      else if (diff < 0) alerts.push({ tipo: 'scaduto', msg: `${num} — ${nome}: scaduto da ${Math.abs(diff)} giorn${Math.abs(diff)===1?'o':'i'}`, id: p.id });
    }

    // In attesa da troppo tempo (>7 giorni da invio)
    if (p.stato === 'inviato' && p.updatedAt) {
      const upd = p.updatedAt.toDate ? p.updatedAt.toDate() : new Date(p.updatedAt);
      const giorni = Math.round((oggi - upd) / (1000*60*60*24));
      if (giorni >= 7) alerts.push({ tipo: 'attesa', msg: `${num} — ${nome}: in attesa da ${giorni} giorni`, id: p.id });
    }
  });

  if (!alerts.length) return;

  // Mostra badge notifiche nella topbar
  const badge = document.createElement('button');
  badge.className = 'btn btn-ghost btn-icon';
  badge.title = `${alerts.length} notifica${alerts.length>1?'e':''}`;
  badge.style.cssText = 'position:relative;color:var(--danger)';
  badge.innerHTML = `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span style="position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid white"></span>`;
  badge.onclick = () => mostraNotifiche(alerts);
  const searchBtn = document.getElementById('global-search-btn');
  if (searchBtn) searchBtn.parentElement.insertBefore(badge, searchBtn);
}

function mostraNotifiche(alerts) {
  const icone = { scadenza: '⏰', scaduto: '⚠️', attesa: '📬' };
  openModal(`
    <div class="modal-header">
      <h2 class="modal-title">🔔 Notifiche (${alerts.length})</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:8px">
        ${alerts.map(a => `
          <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:8px;border-left:3px solid ${a.tipo==='scaduto'?'var(--danger)':a.tipo==='scadenza'?'#E67E22':'var(--info)'}">
            <span style="font-size:1.2rem">${icone[a.tipo]}</span>
            <div style="flex:1;font-size:0.88rem">${a.msg}</div>
            <button class="btn btn-ghost btn-sm" onclick="closeModal();openPreventivoModal('${a.id}')">Apri</button>
          </div>`).join('')}
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Chiudi</button>
    </div>`);
}
